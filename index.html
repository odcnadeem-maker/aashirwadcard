<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aashirwad Card Calendar Portfolio</title>
    <style>
        /* CSS reset aur base styles */
        body, h1, h2, p, a {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            color: white;
            font-family: Arial, sans-serif;
        }

        /* Dark background container */
        body {
            background-color: #0c1421;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navbar */
        .navbar {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #4da6ff;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links a {
            margin-left: 20px;
            font-size: 14px;
        }

        /* Hero section (central part) */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .main-heading {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .sub-heading {
            font-size: 16px;
            margin-bottom: 30px;
            color: #b0b0b0; /* Light gray color for subheading */
        }

        /* Central light blue button */
        .contact-btn {
            background-color: #4da6ff;
            color: black;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Top Nav-bar -->
    <nav class="navbar">
        <div class="logo">MyPortfolio</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Skills</a>
            <a href="#">Projects</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- Main Hero section -->
    <main class="hero">
        <h1 class="main-heading">Welcome to Aashirwad Card Calendar</h1>
        <p class="sub-heading">I am a passionate Developer / Designer creating awesome digital experiences.</p>
        <a href="#" class="contact-btn">Get In Touch</a>
    </main>
</body>
</html>
